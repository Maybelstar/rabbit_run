<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Tells the browser which characters this page uses -->
    <meta charset="UTF-8" />

    <!-- Makes the page scale nicely on phones and tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- The text shown in the browser tab -->
    <title>Rabbit Run</title>

    <!-- Connect this HTML file to the CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main game content -->
    <main class="container">
      <p class="version-badge">v1.3</p>

      <!-- Game title -->
      <h1>Rabbit Run</h1>
      <p class="subtitle">Hop through a retro level, stomp critters, and collect shining coins.</p>

      <!-- Score and timer area -->
      <div class="info">
        <div class="info-column info-left">
          <p><span class="stat-label">High score:</span> <span id="high-score-value">0 by Nobody yet</span></p>
        </div>
        <div class="info-column info-right">
          <p><span class="stat-label">Time:</span> <span id="timer">0.0</span>s</p>
          <p><span class="stat-label">Distance:</span> <span id="distance">0%</span></p>
        </div>
      </div>

      <!-- This is the side-scrolling game area -->
      <div id="game-area" aria-label="Retro platform game area">
        <div id="score-overlay"><span class="stat-label">Score:</span> <span id="score">0</span></div>
        <div id="world-stage">
          <div class="sky-decor decor-sun"></div>
          <div class="sky-decor decor-cloud cloud-one"></div>
          <div class="sky-decor decor-cloud cloud-two"></div>
          <div class="sky-decor decor-cloud cloud-three"></div>
          <div class="hill hill-back"></div>
          <div class="hill hill-front"></div>
          <div id="parallax-strip"></div>
          <div id="coins-layer"></div>
          <div id="obstacles-layer"></div>
          <div id="finish-flag" aria-hidden="true">
            <div class="flag-top"></div>
            <div class="flag-banner"></div>
          </div>
          <div id="runner" aria-hidden="true">
            <div class="rabbit-ear ear-left"></div>
            <div class="rabbit-ear ear-right"></div>
            <div class="rabbit-head"></div>
            <div class="rabbit-body"></div>
            <div class="rabbit-tail"></div>
          </div>
          <div id="ground"></div>
        </div>
      </div>

      <!-- Message shown before and after the game -->
      <p id="message">Move left, right, or jump to start the run.</p>

      <div class="touch-controls" id="mobile-controls" aria-label="On-screen game controls">
        <div class="control-cluster action-cluster" aria-label="Jump controls">
          <button class="control-button control-jump" type="button" data-control="jump" aria-label="Jump">Jump</button>
        </div>
        <div class="control-cluster move-cluster" aria-label="Movement controls">
          <button class="control-button control-move" type="button" data-control="left" aria-label="Move left">Left</button>
          <button class="control-button control-move" type="button" data-control="right" aria-label="Move right">Right</button>
        </div>
      </div>
    </main>

    <!-- Connect this HTML file to the JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
